<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍽️ Mess Food Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .meal-card { border-radius: 12px; transition: transform 0.2s; }
    .meal-card:hover { transform: translateY(-3px); }
    .star-badge { font-size: 1.1rem; }
    .override-badge { font-size: 0.75rem; }
    .navbar-brand { font-size: 1.4rem; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4 mb-4">
  <a class="navbar-brand" href="/">🍽️ Mess Food Review</a>
  <div class="d-flex align-items-center gap-3">
    <a href="/weekly/" class="btn btn-outline-light btn-sm">📊 Weekly Trend</a>
    <span class="text-secondary">{{ today }}</span>
  </div>
</nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
